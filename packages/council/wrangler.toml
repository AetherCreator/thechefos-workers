name = "council"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "cc231edbff18405233612d7afb657f1f"

# Cron restored 2026-05-07 evening (A3 of NEXT-SESSION fork). 1h after Locke's
# weekly fire so any new leads get deliberated same cycle. Sunday 01:00 UTC =
# Saturday 6pm PT. Use named-day form per cf-cron-strictness pattern (numeric
# "0 1 * * 0" was rejected with code 10100 on first deploy attempt).
[triggers]
crons = ["0 1 * * SUN"]

[vars]
PERSONA = "council"
COUNCIL_SCHEMA_VERSION = "council-1.0"
SUPPORTED_LEAD_VERSIONS = "[\"locke-1.0\"]"
CONFIDENCE_FILTER = "[\"medium\",\"high\",\"dead_certain\"]"
PATTERN_TYPE_FILTER = "[\"repeated\",\"long_con\"]"
THRESHOLD = "95.0"
# NIM_URL retained as legacy var (no longer read by code post Kimi pivot 2026-05-07);
# kept in env to ease revert if Kimi K2.6 underperforms on judge prompts.
NIM_URL = "https://integrate.api.nvidia.com/v1/chat/completions"
# Model: Workers AI Kimi K2.6 (in-network, sync) — pivoted 2026-05-07 from
# nvidia/nemotron-3-super-120b-a12b. Locke's session-9 smoke validated Kimi K2.6
# on multi-lead reasoning + JSON output; same envelope works for judge prompts.
# Vendor independence + escape from NVIDIA edge 524 ceiling at ~145s.
NIM_MODEL = "@cf/moonshotai/kimi-k2.6"
BRAIN_RAW_BASE = "https://raw.githubusercontent.com/AetherCreator/SuperClaude/main"
BRAIN_GH_API_BASE = "https://api.github.com/repos/AetherCreator/SuperClaude/contents"
BRAIN_WRITE_URL = "https://api.thechefos.app/api/brain/push"
INTEL_LOG_URL = "https://api.thechefos.app/api/intel/log"
WALL_CLOCK_BUDGET_MS = "90000"
# Per-judge timeout 60s — was needed for NIM Nemotron edge latency. Kimi K2.6
# in-network smoke (2026-05-07) ran 18.7s wall on stub lead — actual per-judge
# usage closer to 15-20s. 60s gives massive headroom; tunable down to 30-45s
# after 2-3 cron cycles validate consistent performance.
PER_JUDGE_TIMEOUT_MS = "60000"
TYLER_CHAT_ID = "6091970994"

[ai]
binding = "AI"
