name = "council"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "cc231edbff18405233612d7afb657f1f"

# CRON MIGRATED TO N8N (2026-05-07): CF account hit 5/5 cron quota cap (code 10072).
# Council fires Sun 01:00 UTC via n8n schedule node POSTing /run-manual.
# Workflow JSON: n8n/council-weekly.json (import via n8n UI, set COUNCIL_RUN_SECRET env).
# Architectural: avoids vendor cron quota for future swarm Workers (Schemer/Builder v1.1).

[vars]
PERSONA = "council"
COUNCIL_SCHEMA_VERSION = "council-1.0"
SUPPORTED_LEAD_VERSIONS = "[\"locke-1.0\"]"
# 2026-05-10: pre-filter loosened to accept all Locke output. Council's 95.0
# geometric mean + Foundry canary gate are the actual quality gates. Kept as
# schema-version guard only; expand if Locke produces calibrated discrimination.
CONFIDENCE_FILTER = "[\"low\",\"medium\",\"high\",\"dead_certain\"]"
PATTERN_TYPE_FILTER = "[\"single_signal\",\"repeated\",\"long_con\"]"
THRESHOLD = "95.0"
# NIM_URL retained as legacy var (no longer read by code post Kimi pivot 2026-05-07);
# kept in env to ease revert if Kimi K2.6 underperforms on judge prompts.
NIM_URL = "https://integrate.api.nvidia.com/v1/chat/completions"
# Model: Workers AI Kimi K2.6 (in-network, sync) — pivoted 2026-05-07 from
# nvidia/nemotron-3-super-120b-a12b. Locke's session-9 smoke validated Kimi K2.6
# on multi-lead reasoning + JSON output; same envelope works for judge prompts.
# Vendor independence + escape from NVIDIA edge 524 ceiling at ~145s.
NIM_MODEL = "@cf/moonshotai/kimi-k2.6"
BRAIN_RAW_BASE = "https://raw.githubusercontent.com/AetherCreator/SuperClaude/main"
BRAIN_GH_API_BASE = "https://api.github.com/repos/AetherCreator/SuperClaude/contents"
BRAIN_WRITE_URL = "https://api.thechefos.app/api/brain/push"
INTEL_LOG_URL = "https://api.thechefos.app/api/intel/log"
WALL_CLOCK_BUDGET_MS = "90000"
# Per-judge timeout 60s — was needed for NIM Nemotron edge latency. Kimi K2.6
# in-network smoke (2026-05-07) ran 18.7s wall on stub lead — actual per-judge
# usage closer to 15-20s. 60s gives massive headroom; tunable down to 30-45s
# after 2-3 cron cycles validate consistent performance.
PER_JUDGE_TIMEOUT_MS = "60000"
TYLER_CHAT_ID = "6091970994"

# Foundry canary gate (added 2026-05-09, lifted 2026-05-10):
# "false" → approved verdicts route to brain/05-leads/_canary/ until Tyler reviews and lifts.
# "true"  → approved verdicts route normally; Schemer is unblocked.
# Lifted 2026-05-10 after recalibration: criteria changed from "3 approvals" to
# "3 verified verdicts of any decision". Sunday first organic fire produced 3
# sharp Council judgments (2 kills + 1 abstain) demonstrating discrimination
# capability; Locke's current low/single_signal output unlikely to organically
# score ≥95. Reverse-lift symmetric: flip to "false" + redeploy.
# Protocol: brain/02-knowledge/foundry-canary-protocol.md (recalibrated 2026-05-10)
CANARY_LIFTED = "true"

[ai]
binding = "AI"
