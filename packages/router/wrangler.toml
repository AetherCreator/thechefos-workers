name = "thechefos-router"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[[services]]
binding = "AI_GATEWAY"
service = "thechefos-ai-gateway"

[[services]]
binding = "BRAIN_GRAPH"
service = "superclaude-brain-graph"

[[services]]
binding = "BRAIN_SEARCH"
service = "thechefos-brain-search"

[[services]]
binding = "BRAIN_WRITE"
service = "thechefos-brain-write"

[[services]]
binding = "MCP_SERVER"
service = "thechefos-mcp-server"

[[services]]
binding = "OAUTH_SERVER"
service = "thechefos-oauth-server"

[[services]]
binding = "TELEGRAM_BOT"
service = "thechefos-telegram-bot"
