name = "thechefos-router"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "PLACEHOLDER_KV_ID"

[[services]]
binding = "CHEFOS"
service = "chefos-worker"

[[services]]
binding = "SUPERCONCI"
service = "superconci-worker"

[[services]]
binding = "MOREWORDS"
service = "morewords-worker"

[[services]]
binding = "AI_GATEWAY"
service = "thechefos-ai-gateway"
