name = "thechefos-reflection"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[[d1_databases]]
binding = "BRAIN_D1"
database_name = "superclaude-brain"
database_id = "c9f55aaf-ac80-4111-b78e-9339a2f8e377"

[triggers]
crons = ["0 22 * * SUN"]  # Sunday 22:00 UTC = 5PM ET

[vars]
WORKER_VERSION = "0.1.0"
GITHUB_OWNER = "AetherCreator"
GITHUB_REPO = "SuperClaude"
BRAIN_WRITE_BASE = "https://thechefos-brain-write.tveg-baking.workers.dev"

# Secrets (set via `wrangler secret put` post-deploy in C3, NOT in this clue):
#   REFLECTION_API_SECRET       — X-Reflection-Key match value
#   GITHUB_REFLECTION_PAT       — fine-grained PAT, write on brain/06-meta/reflection/*
#   BRAIN_WRITE_API_SECRET      — for /api/ops/file dogfood
#   SHIPS_DOCTOR_BOT_TOKEN      — Telegram bot
#   TYLER_CHAT_ID               — Telegram chat id
