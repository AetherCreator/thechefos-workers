name = "locke-harvest"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "cc231edbff18405233612d7afb657f1f"

# Cron restored 2026-05-07 evening (A3 of NEXT-SESSION fork) after Council Kimi
# pivot validated end-to-end. Sunday 00:00 UTC = Saturday 5pm PT — Tyler reviews
# results Sunday morning. Use named-day form per cf-cron-strictness pattern
# (Cloudflare rejected "0 0 * * 0" with code 10100 — numeric form failed).
[triggers]
crons = ["0 0 * * SUN"]

[vars]
# Persona renamed 2026-05-13 (OPS-LOCKE-LOOKOUT-RENAME, Crew Bible §7).
# Crew role: Lookout — weekly crow's-nest scan of Reddit/HN for demand signals.
# Reports to Captain. Worker deployment name `locke-harvest` retained because
# it's the Cloudflare resource identifier, not the persona label. Schema
# version `locke-1.2` retained for downstream (Council) compatibility — the
# schema is named after the persona-framework history, not the live persona.
# See prompts/LOOKOUT-SOUL.md for full role definition.
PERSONA = "lookout"
BRAIN_PATH = "brain/05-leads"
# SearXNG removed 2026-05-11 (the-prism C3 post-mortem). Replaced by hybrid
# adapter system in src/searchAdapters.ts: Reddit native search.json + HN
# Algolia Search API + Brave Search API fallback. Burst-load tolerance via
# real APIs that want to be called, not engine scrapers that bot-block.
INTEL_LOG_URL = "https://api.thechefos.app/api/intel/log"
BRAIN_WRITE_URL = "https://api.thechefos.app/api/brain/push"
# Analysis tier history:
#   2026-05-07: pivoted to Workers AI Kimi K2.6 (NIM_MODEL was @cf/moonshotai/kimi-k2.6).
#   2026-05-11 (afternoon): reverted to NIM Nemotron-120B HTTP after Workers AI 4006 quota hit.
#   2026-05-11 (evening, OPS-LOCKE-NIM-CEILING): swapped to Workers AI Llama-3.3-70b-fast.
#     Reason: NIM Nemotron-120B's ~145s NVIDIA edge ceiling was brittle even at slice(0,3) —
#     fires 1+3+6 524'd, fires 4+5 cleared. Variable-time <think> reasoning. Llama-3.3-70b-fast
#     runs in-network (no edge timeout), 5-15s typical wall. Slice bumped 0,3→0,8 for breadth.
#     Code now uses env.AI.run(env.NIM_MODEL, ...) binding; NIM_URL+NIM_API_KEY declared but
#     unused so future re-pivots are config-only.
NIM_URL = "https://integrate.api.nvidia.com/v1/chat/completions"
NIM_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
SCHEMA_VERSION = "locke-1.2"
MAX_LEADS_PER_RUN = "5"
WALL_CLOCK_BUDGET_MS = "480000"
NIM_BUDGET = "50"
# Per-query sleep lowered 8000→1500ms 2026-05-11 evening (adapter pivot).
# Original 8s was burst-protection against SearXNG's bot-blocked engine pool.
# Direct API targets (Reddit anon: 60/min, HN Algolia: very generous, Brave free:
# 1 q/sec) tolerate ~1.5s spacing comfortably. 1500ms × 20 queries = 30s spacing
# total. Phase 1 wall now ~40-60s (vs prior 200-220s), NIM ~80-130s, total fire
# ~120-200s ≪ 480s budget — leaves plenty of margin for slow-API quarters.
PER_QUERY_SLEEP_MS = "1500"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CHANGELOG_SEEN"
id = "PLACEHOLDER_FILLED_IN_C5"
