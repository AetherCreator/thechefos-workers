name = "locke-harvest"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "cc231edbff18405233612d7afb657f1f"

# Cron restored 2026-05-07 evening (A3 of NEXT-SESSION fork) after Council Kimi
# pivot validated end-to-end. Sunday 00:00 UTC = Saturday 5pm PT — Tyler reviews
# results Sunday morning. Use named-day form per cf-cron-strictness pattern
# (Cloudflare rejected "0 0 * * 0" with code 10100 — numeric form failed).
[triggers]
crons = ["0 0 * * SUN"]

[vars]
PERSONA = "locke-lamora"
BRAIN_PATH = "brain/05-leads"
SEARXNG_URL = "https://searxng.thechefos.app/search"
# Engine portfolio — widened 2026-05-11 (the-prism/clue-3) after `brave,google`
# duo bot-suspended Brave inside one 20-query burst at 12:33Z, leaving Google
# silently returning 0 on `site:reddit.com`. Six engines give SearXNG enough
# redundancy that one bot-block doesn't tank Phase 1. Most of these CAPTCHA on
# burst load (per 2026-05-07 §B4) — the 8s PER_QUERY_SLEEP_MS below is what
# actually prevents re-suspension; this list is the recovery surface.
SEARXNG_ENGINES = "brave,google,bing,duckduckgo,mojeek,startpage"
INTEL_LOG_URL = "https://api.thechefos.app/api/intel/log"
BRAIN_WRITE_URL = "https://api.thechefos.app/api/brain/push"
# Analysis tier: NIM Nemotron-120B via OpenAI-compatible chat-completions HTTP.
#   2026-05-07: pivoted to Workers AI Kimi K2.6 binding (NIM_MODEL was @cf/moonshotai/kimi-k2.6).
#   2026-05-11: reverted to NIM Nemotron-120B HTTP after Workers AI free-tier 10k neurons/day
#     cap blocked the-prism/clue-3 smoke. NIM_URL unchanged; NIM_MODEL flipped back to NIM ID.
NIM_URL = "https://integrate.api.nvidia.com/v1/chat/completions"
NIM_MODEL = "nvidia/nemotron-3-super-120b-a12b"
SCHEMA_VERSION = "locke-1.1"
MAX_LEADS_PER_RUN = "5"
WALL_CLOCK_BUDGET_MS = "480000"
NIM_BUDGET = "50"
# Per-query sleep bumped 2s→8s 2026-05-11 (the-prism/clue-3). 2s was insufficient
# to keep Brave under its bot-block threshold across 20 queries — suspension
# observed at 12:33Z lasted >17 min and persisted into the 12:50Z refire. 8s × 20
# queries = 160s of spacing, well under the 480s wall budget, and per-query
# spacing >> any individual engine's per-IP cooldown window. Total Phase 1 wall
# ~200–220s, NIM ~80–130s, total fire ~300–350s ≪ 480s budget.
PER_QUERY_SLEEP_MS = "8000"

[ai]
binding = "AI"
