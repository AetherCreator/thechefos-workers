name = "locke-harvest"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "cc231edbff18405233612d7afb657f1f"

# [triggers] block intentionally omitted for MVP — Cloudflare's cron parser rejected
# "0 0 * * 0" with code 10100 ("invalid cron string") on first deploy. Worker uploads
# fine; only schedules registration failed. Add back once SearXNG is wired and we're
# ready for autonomous fires; until then, manual POST /run is the trigger surface.
# When restoring, prefer named-day form: crons = ["0 0 * * SUN"]

[vars]
PERSONA = "locke-lamora"
BRAIN_PATH = "brain/05-leads"
SEARXNG_URL = "https://searxng.thechefos.app/search"
# Pin to engines that don't bot-block our `site:reddit.com`-style queries under
# burst load. Tested 2026-05-07: brave is the only reliable free engine; DDG,
# Qwant, Karmasearch, Startpage all return CAPTCHA / 403 / HTTP 400 to SearXNG
# when fired in 10-query bursts. Tunable comma-list when others stabilize.
SEARXNG_ENGINES = "brave,google"
INTEL_LOG_URL = "https://api.thechefos.app/api/intel/log"
BRAIN_WRITE_URL = "https://api.thechefos.app/api/brain/push"
# Analysis tier: NIM Nemotron-120B via OpenAI-compatible chat-completions (was Gemini Flash;
# swapped 2026-05-07 to reuse Tyler's existing NIM access — vendor-independence + cost discipline)
NIM_URL = "https://integrate.api.nvidia.com/v1/chat/completions"
NIM_MODEL = "@cf/moonshotai/kimi-k2.6"
SCHEMA_VERSION = "locke-1.0"
MAX_LEADS_PER_RUN = "5"
WALL_CLOCK_BUDGET_MS = "480000"
NIM_BUDGET = "50"
PER_QUERY_SLEEP_MS = "2000"

[ai]
binding = "AI"
