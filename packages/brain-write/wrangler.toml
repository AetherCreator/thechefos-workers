name = "thechefos-brain-write"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# GITHUB_TOKEN, WEBHOOK_SECRET, GITHUB_WEBHOOK_SECRET set via wrangler secret put

[[kv_namespaces]]
binding = "SESSION_KV"
id = "e9dfcffc9e094365aec142267cb39a1e"

# Guard Layer (P0.5) — idempotency cache + audit dedup.
# Create with: `wrangler kv namespace create idempotency-keys` then paste id below.
[[kv_namespaces]]
binding = "IDEMPOTENCY_KEYS"
id = "fee11c9392d141d49eb8efa7d495d7be"

# Guard Layer secrets (set with `wrangler secret put <NAME>`):
#   TYLER_CHAT_ID            — defaults to 6091970994 in notifier if unset
#   SHIPS_DOCTOR_BOT_TOKEN   — Crazy I. Joe bot (Crew Bible §4); falls back to MASTRO_BOT_TOKEN

# P5 Pa: KV IDs are placeholders; C4 mints real namespaces and patches them in.
# DO NOT deploy with these placeholder values — wrangler dry-run is the safe check.
[[kv_namespaces]]
binding = "CREW_XP_KV"
id = "55a1eebe922a46aebca6ddd9cd815bdf"

[[kv_namespaces]]
binding = "CREW_XP_DEDUP_KV"
id = "d5cedded1ddb4605b3f7d97a5b87158d"

[[kv_namespaces]]
binding = "SPIRIT_LEVEL_KV"
id = "14784b4f0e244159a38946da173f9167"

[[d1_databases]]
binding = "SUPERCLAUDE_BRAIN"
database_name = "superclaude-brain"
database_id = "c9f55aaf-ac80-4111-b78e-9339a2f8e377"
migrations_dir = "migrations"

[vars]
# C2.2 runtime-verify rollout (2026-05-31): defer unsimulatable verify_log entries to the
# decoupled runtime tier (RUNTIME_DEFER) + enforce the runtime verdict via replay-driven
# AND-in (RUNTIME_REQUIRED). Dedicated RUNTIME_VERIFY_KEY deferred (coordinated rotation;
# fallback to GITHUB_WEBHOOK_SECRET keeps on-box callbacks working until then).
RUNTIME_DEFER = "true"
RUNTIME_REQUIRED = "true"
