name = "thechefos-brain-write"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# GITHUB_TOKEN, WEBHOOK_SECRET, GITHUB_WEBHOOK_SECRET set via wrangler secret put

[[kv_namespaces]]
binding = "SESSION_KV"
id = "e9dfcffc9e094365aec142267cb39a1e"

# Guard Layer (P0.5) — idempotency cache + audit dedup.
# Create with: `wrangler kv namespace create idempotency-keys` then paste id below.
[[kv_namespaces]]
binding = "IDEMPOTENCY_KEYS"
id = "fee11c9392d141d49eb8efa7d495d7be"

# Guard Layer secrets (set with `wrangler secret put <NAME>`):
#   TYLER_CHAT_ID            — defaults to 6091970994 in notifier if unset
#   SHIPS_DOCTOR_BOT_TOKEN   — Crazy I. Joe bot (Crew Bible §4); falls back to MASTRO_BOT_TOKEN

# P5 Pa: KV IDs are placeholders; C4 mints real namespaces and patches them in.
# DO NOT deploy with these placeholder values — wrangler dry-run is the safe check.
[[kv_namespaces]]
binding = "CREW_XP_KV"
id = "PLACEHOLDER_CREW_XP_KV_ID"

[[kv_namespaces]]
binding = "CREW_XP_DEDUP_KV"
id = "PLACEHOLDER_CREW_XP_DEDUP_KV_ID"
