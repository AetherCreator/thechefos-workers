name = "superclaude-brain-graph"
main = "src/index.ts"
compatibility_date = "2026-03-01"

# GITHUB_TOKEN must be set as a Cloudflare Worker Secret (not plaintext)
# Set via: Cloudflare Dashboard → superclaude-brain-graph → Settings → Variables and Secrets → Add Secret

[triggers]
# 0 5 * * 1 = 5am UTC Mondays — weekly odometer reset
# 0 6 * * 7 = 6am UTC Sundays — cognitive-cache generate + push (weekly, was daily)
# Changed from daily (0 6 * * *) to weekly to reduce Worker invocations + GitHub push churn
# NOTE: Sunday=7 (ISO) instead of 0 (POSIX) — Cloudflare's schedules API rejects 0 with code 10100
crons = ["0 5 * * 1", "0 6 * * 7"]

[[d1_databases]]
binding = "BRAIN_DB"
database_name = "superclaude-brain"
database_id = "c9f55aaf-ac80-4111-b78e-9339a2f8e377"
