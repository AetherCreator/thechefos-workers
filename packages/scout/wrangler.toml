name = "thechefos-scout"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[vars]
SEARXNG_URL = "http://localhost:8888"
# Override via wrangler secret put for production:
# SEARXNG_URL = "https://searx.thechefos.app"

# KV namespace for URL content cache (7-day TTL)
# Create with: wrangler kv namespace create SCOUT_KV
# Then paste the ID below
# [[kv_namespaces]]
# binding = "SCOUT_KV"
# id = "TO_BE_CREATED"
