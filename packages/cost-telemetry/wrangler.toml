name = "cost-telemetry"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "cc231edbff18405233612d7afb657f1f"

[vars]
PERSONA = "cost-telemetry"
TELEMETRY_SCHEMA_VERSION = "telemetry-1.0"
NEURON_CAP = "10000"
LOCKE_NEURONS_PER_FIRE = "3000"
COUNCIL_NEURONS_PER_FIRE = "900"
SCHEMER_NEURONS_PER_FIRE = "500"
REVIEWER_NEURONS_PER_FIRE = "500"
BRAIN_RAW_BASE = "https://raw.githubusercontent.com/AetherCreator/SuperClaude/main"
BRAIN_GH_API_BASE = "https://api.github.com/repos/AetherCreator/SuperClaude/contents"
BRAIN_WRITE_URL = "https://api.thechefos.app/api/brain/push"

[[kv_namespaces]]
binding = "KV"
id = "fb64c3edbf8043e38814a9ce543e760c"

# [triggers] block removed 2026-05-09: account at 5/5 free-plan cron cap when
# cost-telemetry first deployed. /dashboard recomputes on-demand when KV is stale
# (loadRollup falls back to recomputeRollup), so cron is nice-to-have not critical.
# Re-add when a cron slot frees up OR account upgrades from free plan.
