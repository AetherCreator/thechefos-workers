name: Deploy Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ai-gateway:
    name: Deploy AI Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/ai-gateway
        run: |
          npm install
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-router:
    name: Deploy Router
    runs-on: ubuntu-latest
    needs: deploy-ai-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/router
        run: |
          npm install
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-brain-write:
    name: Deploy Brain Write
    runs-on: ubuntu-latest
    if: ${{ hashFiles('packages/brain-write/wrangler.toml') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/brain-write
        run: |
          npm install
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-mcp-server:
    name: Deploy MCP Server
    runs-on: ubuntu-latest
    if: ${{ hashFiles('packages/mcp-server/wrangler.toml') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/mcp-server
        run: |
          npm install
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-telegram-bot:
    name: Deploy Lamora (Telegram Bot)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('packages/telegram-bot/wrangler.toml') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/telegram-bot
        run: |
          npm install
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
