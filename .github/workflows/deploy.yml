name: Deploy Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ai-gateway:
    name: Deploy AI Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/ai-gateway
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-brain-graph:
    name: Deploy Brain Graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/brain-graph
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-proxy:
    name: Deploy Proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/proxy
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        working-directory: packages/proxy
        run: |
          printf '%s' "$GH_TOKEN"             | npx wrangler secret put GITHUB_TOKEN    || true
          printf '%s' "$CF_API_TOKEN_SECRET"  | npx wrangler secret put CF_API_TOKEN    || true
          printf '%s' "$CF_ACCOUNT_ID_SECRET" | npx wrangler secret put CF_ACCOUNT_ID   || true
          printf '%s' "$VERCEL_TOKEN"         | npx wrangler secret put VERCEL_TOKEN    || true
          printf '%s' "$VERCEL_TEAM_ID"       | npx wrangler secret put VERCEL_TEAM_ID  || true
          printf '%s' "$MCP_AUTH_TOKEN"       | npx wrangler secret put MCP_AUTH_TOKEN  || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CF_API_TOKEN_SECRET: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID_SECRET: ${{ secrets.CF_ACCOUNT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}

  deploy-scout:
    name: Deploy Scout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/scout
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-router:
    name: Deploy Router
    runs-on: ubuntu-latest
    needs: [deploy-ai-gateway, deploy-brain-graph, deploy-proxy, deploy-scout]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/router
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-brain-write:
    name: Deploy Brain Write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/brain-write
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-mcp-server:
    name: Deploy MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/mcp-server
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-telegram-bot:
    name: Deploy Lamora
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/telegram-bot
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-brain-search:
    name: Deploy Brain Search
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root deps
        run: npm install --legacy-peer-deps
      - name: Deploy
        working-directory: packages/brain-search
        run: npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-oauth:
    name: Deploy OAuth Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root deps
        run: npm install --legacy-peer-deps
      - name: Deploy
        working-directory: packages/oauth-server
        run: npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-locke-harvest:
    name: Deploy Locke Harvest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        working-directory: packages/locke-harvest
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        # Each `|| true` keeps the deploy job green even when a GHA secret hasn't been
        # provisioned yet — the Worker still ships, secrets land on the next run when
        # Tyler adds LOCKE_NIM_API_KEY / LOCKE_BRAIN_WRITE_SECRET / LOCKE_HARVEST_RUN_SECRET
        # to the repo's GitHub Actions secrets.
        # Analysis tier is NIM Nemotron-120B (NVIDIA NIM) — Tyler's NIM key value lives
        # at /opt/secrets/nvidia-api-key on InfiniVeg; copy that value into LOCKE_NIM_API_KEY.
        working-directory: packages/locke-harvest
        run: |
          printf '%s' "$NIM"         | npx wrangler secret put NIM_API_KEY         || true
          printf '%s' "$BRAIN_WRITE" | npx wrangler secret put BRAIN_WRITE_SECRET  || true
          printf '%s' "$RUN_SECRET"  | npx wrangler secret put HARVEST_RUN_SECRET  || true
          printf '%s' "$GH_TOKEN"    | npx wrangler secret put GITHUB_TOKEN        || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NIM: ${{ secrets.LOCKE_NIM_API_KEY }}
          BRAIN_WRITE: ${{ secrets.LOCKE_BRAIN_WRITE_SECRET }}
          RUN_SECRET: ${{ secrets.LOCKE_HARVEST_RUN_SECRET }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  deploy-council:
    name: Deploy Council
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if package exists
        # Step-level guard pattern (replaces the broken job-level hashFiles `if:` —
        # GHA rejected `if: ${{ hashFiles(...) }}` at workflow-validate time for
        # opaque reasons, even though the YAML parses cleanly locally). Step-level
        # `if:` against a step output works reliably and produces a clean "skipped"
        # status for downstream steps when packages/council/ isn't yet shipped.
        id: check
        run: |
          if [ -f packages/council/wrangler.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "📦 packages/council/ present — proceeding with deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📦 packages/council/ not yet shipped — skipping deploy steps (will activate when C6 cp commit lands)"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '20'
      - name: Deploy
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/council
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        # Same fails-soft pattern as deploy-locke-harvest. Tyler-side prerequisites:
        # add COUNCIL_NIM_API_KEY (same value as LOCKE_NIM_API_KEY — the NIM key from
        # /opt/secrets/nvidia-api-key), COUNCIL_BRAIN_WRITE_SECRET (= "SuperDuperClaude"),
        # COUNCIL_RUN_SECRET (random 32-char), and optionally COUNCIL_TELEGRAM_TOKEN.
        # GITHUB_TOKEN is required to read leads from the private brain repo —
        # reuses the same GH_TOKEN GHA secret already used by deploy-proxy.
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/council
        run: |
          printf '%s' "$NIM"             | npx wrangler secret put NIM_API_KEY              || true
          printf '%s' "$BRAIN_WRITE"     | npx wrangler secret put BRAIN_WRITE_SECRET       || true
          printf '%s' "$RUN_SECRET"      | npx wrangler secret put COUNCIL_RUN_SECRET       || true
          printf '%s' "$GH_TOKEN"        | npx wrangler secret put GITHUB_TOKEN             || true
          printf '%s' "$TELEGRAM_TOKEN"  | npx wrangler secret put COUNCIL_TELEGRAM_TOKEN   || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NIM: ${{ secrets.COUNCIL_NIM_API_KEY }}
          BRAIN_WRITE: ${{ secrets.COUNCIL_BRAIN_WRITE_SECRET }}
          RUN_SECRET: ${{ secrets.COUNCIL_RUN_SECRET }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.COUNCIL_TELEGRAM_TOKEN }}

  deploy-schemer:
    name: Deploy Schemer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if package exists
        id: check
        run: |
          if [ -f packages/schemer/wrangler.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "📦 packages/schemer/ present — proceeding with deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📦 packages/schemer/ not yet shipped — skipping"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '20'
      - name: Deploy
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/schemer
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/schemer
        run: |
          printf %s "$BRAIN_WRITE" | npx wrangler secret put BRAIN_WRITE_SECRET || true
          printf %s "$RUN_SECRET"  | npx wrangler secret put SCHEMER_RUN_SECRET || true
          printf %s "$GH_TOK"      | npx wrangler secret put GITHUB_TOKEN       || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BRAIN_WRITE: ${{ secrets.SCHEMER_BRAIN_WRITE_SECRET }}
          RUN_SECRET: ${{ secrets.SCHEMER_RUN_SECRET }}
          GH_TOK: ${{ secrets.GH_TOKEN }}

  deploy-builder:
    name: Deploy Builder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if package exists
        id: check
        run: |
          if [ -f packages/builder/wrangler.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '20'
      - name: Deploy
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/builder
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/builder
        run: |
          printf %s "$BRAIN_WRITE" | npx wrangler secret put BRAIN_WRITE_SECRET || true
          printf %s "$RUN_SECRET"  | npx wrangler secret put BUILDER_RUN_SECRET || true
          printf %s "$GH_TOK"      | npx wrangler secret put GITHUB_TOKEN       || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BRAIN_WRITE: ${{ secrets.BUILDER_BRAIN_WRITE_SECRET }}
          RUN_SECRET: ${{ secrets.BUILDER_RUN_SECRET }}
          GH_TOK: ${{ secrets.GH_TOKEN }}

  deploy-reviewer:
    name: Deploy Reviewer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if package exists
        id: check
        run: |
          if [ -f packages/reviewer/wrangler.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '20'
      - name: Deploy
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/reviewer
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/reviewer
        run: |
          printf %s "$BRAIN_WRITE"  | npx wrangler secret put BRAIN_WRITE_SECRET  || true
          printf %s "$RUN_SECRET"   | npx wrangler secret put REVIEWER_RUN_SECRET || true
          printf %s "$GH_TOK"       | npx wrangler secret put GITHUB_TOKEN        || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BRAIN_WRITE: ${{ secrets.REVIEWER_BRAIN_WRITE_SECRET }}
          RUN_SECRET: ${{ secrets.REVIEWER_RUN_SECRET }}
          GH_TOK: ${{ secrets.GH_TOKEN }}

  deploy-cost-telemetry:
    name: Deploy Cost Telemetry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if package exists
        id: check
        run: |
          if [ -f packages/cost-telemetry/wrangler.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "📦 packages/cost-telemetry/ present — proceeding with deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📦 packages/cost-telemetry/ not yet shipped — skipping"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '20'
      - name: Deploy
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/cost-telemetry
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        # Fails-soft: Tyler-side prerequisites — add TELEMETRY_RUN_SECRET (random 32-char) to repo GHA secrets.
        # BRAIN_WRITE_SECRET reuses the same value as Locke's (LOCKE_BRAIN_WRITE_SECRET = "SuperDuperClaude").
        # GITHUB_TOKEN reuses GH_TOKEN (read-only access to brain/05-leads/_sessions).
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/cost-telemetry
        run: |
          printf '%s' "$BRAIN_WRITE" | npx wrangler secret put BRAIN_WRITE_SECRET   || true
          printf '%s' "$RUN_SECRET"  | npx wrangler secret put TELEMETRY_RUN_SECRET || true
          printf '%s' "$GH_TOK"      | npx wrangler secret put GITHUB_TOKEN         || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BRAIN_WRITE: ${{ secrets.LOCKE_BRAIN_WRITE_SECRET }}
          RUN_SECRET: ${{ secrets.TELEMETRY_RUN_SECRET }}
          GH_TOK: ${{ secrets.GH_TOKEN }}

  deploy-mapmaker:
    name: Deploy Mapmaker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if package exists
        id: check
        run: |
          if [ -f packages/mapmaker/wrangler.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "📦 packages/mapmaker/ present — proceeding with deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📦 packages/mapmaker/ not yet shipped — skipping"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '20'
      - name: Deploy
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/mapmaker
        run: |
          npm install --legacy-peer-deps
          npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set Worker secrets
        # Fails-soft pattern matching deploy-locke-harvest / deploy-council.
        # GHA prerequisites (already provisioned 2026-05-09):
        #   MAPMAKER_TELEGRAM_TOKEN  — @Aether_MapMaker_bot token
        #   MAPMAKER_WEBHOOK_SECRET  — random hex for Telegram webhook auth
        #   FORGE_OPS_CHAT_ID        — THDD group chat_id (-5276079329)
        # BRAIN_WRITE_SECRET reuses LOCKE_BRAIN_WRITE_SECRET (= "SuperDuperClaude").
        if: steps.check.outputs.exists == 'true'
        working-directory: packages/mapmaker
        run: |
          printf '%s' "$TELEGRAM_TOKEN"     | npx wrangler secret put TELEGRAM_TOKEN     || true
          printf '%s' "$WEBHOOK_SECRET"     | npx wrangler secret put WEBHOOK_SECRET     || true
          printf '%s' "$BRAIN_WRITE"        | npx wrangler secret put BRAIN_WRITE_SECRET || true
          printf '%s' "$FORGE_OPS_CHAT_ID"  | npx wrangler secret put FORGE_OPS_CHAT_ID  || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.MAPMAKER_TELEGRAM_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.MAPMAKER_WEBHOOK_SECRET }}
          BRAIN_WRITE: ${{ secrets.LOCKE_BRAIN_WRITE_SECRET }}
          FORGE_OPS_CHAT_ID: ${{ secrets.FORGE_OPS_CHAT_ID }}
