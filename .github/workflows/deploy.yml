name: Deploy Workers to Cloudflare

on:
  workflow_dispatch:
  push:
    branches:
      - claude/deploy-cloudflare-workers-HdPbf

env:
  CLOUDFLARE_ACCOUNT_ID: cc231edbff18405233612d7afb657f1f
  CLOUDFLARE_API_TOKEN: cfut_Gnov3IipBsMPo6pePBm1giLhnTS1xuH6XZJ0Iqdgd3e63b83

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all workspace dependencies
        run: npm install

      - name: Deploy router
        run: npx wrangler deploy
        working-directory: packages/router

      - name: Deploy ai-gateway
        run: npx wrangler deploy
        working-directory: packages/ai-gateway
        continue-on-error: true
